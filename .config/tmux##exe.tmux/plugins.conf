# --- Plugin path (XDG-aware) -------------------------------------------------
# Determine plugin directory based on XDG_DATA_HOME
if-shell -b "test -n \"\$XDG_DATA_HOME\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"\$XDG_DATA_HOME/tmux/plugins\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"$HOME/.local/share/tmux/plugins\""

# --- Bootstrap TPM if missing ------------------------------------------------
# Run the bootstrap script to ensure TPM is installed with proper error handling
run-shell -b "~/.config/tmux/bootstrap-tpm.sh"

# --- Plugins -----------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jabirali/tmux-tilish'

set -g @tilish-bindings "on"
set -g @tilish-cycle "on"

# --- Initialize TPM (keep at end) -------------------------------------------
# Source tpm initialization and key bindings directly
run-shell "~/.local/share/tmux/plugins/tpm/tpm"

# --- Source plugin scripts directly -------------------------------------------
# This ensures plugins are loaded during config load, not in background
run-shell '[ -f "$HOME/.local/share/tmux/plugins/tmux-sensible/sensible.tmux" ] && source "$HOME/.local/share/tmux/plugins/tmux-sensible/sensible.tmux"'
run-shell '[ -f "$HOME/.local/share/tmux/plugins/vim-tmux-navigator/vim_tmux_navigator.tmux" ] && source "$HOME/.local/share/tmux/plugins/vim-tmux-navigator/vim_tmux_navigator.tmux"'
run-shell '[ -f "$HOME/.local/share/tmux/plugins/tmux-tilish/tilish.tmux" ] && "$HOME/.local/share/tmux/plugins/tmux-tilish/tilish.tmux"'

