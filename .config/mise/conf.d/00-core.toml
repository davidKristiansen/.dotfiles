fd = "latest"
ripgrep = "latest"
fzf = "latest"
delta = "latest"
direnv = "latest"
neovim = "nightly"
lazygit = "latest"
yazi = "latest"
opencode = "latest"
"cargo:eza" = "latest"
"cargo:zoxide" = "latest"
"cargo:television" = "latest"
zoxide = "latest"
