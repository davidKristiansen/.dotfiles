# Mutagen global configuration
# https://mutagen.io/documentation/introduction/configuration
#
# Star topology — this config ships to all machines via dotfiles.
# Each spoke connects to the hub via an SSH host alias in ~/.ssh/config:
#
#   Host vault-hub
#     HostName <server-fqdn>
#     User <username>
#
# Then create the sync session:
#   mutagen sync create --name=vault \
#     ~/.local/share/vault vault-hub:~/.local/share/vault

sync:
  defaults:
    mode: "two-way-safe"
    symlink:
      mode: "portable"
    watch:
      mode: "portable"
    ignore:
      paths:
        # OS metadata
        - ".DS_Store"
        - "Thumbs.db"
        - "desktop.ini"
        # Obsidian workspace state (per-device)
        - ".obsidian/workspace.json"
        - ".obsidian/workspace-mobile.json"
      vcs: true
    permissions:
      defaultFileMode: "0644"
      defaultDirectoryMode: "0755"
