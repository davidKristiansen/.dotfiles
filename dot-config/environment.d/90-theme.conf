# Qt apps -> qt6ct, which delegates widget styling to Kvantum (Gruvbox-Dark-Hard).
# Covers Qt6 apps (the common case). For a Qt5-only app, launch it with
# QT_QPA_PLATFORMTHEME=qt5ct, or set QT_QPA_PLATFORMTHEME=kvantum here to style
# both Qt5 and Qt6 in one shot (at the cost of qt6ct's font/icon control).
QT_QPA_PLATFORMTHEME=qt6ct

PROMPT_EOL_MARK='%B%F{red}⏎%f%b'

