# Keybindings. Sourced last (after plugins.conf), so unbinds here reliably
# override plugin-installed maps.

# --- Config reload -----------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# --- Splits (inherit the current pane's working directory) ---------------------
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# --- Session -----------------------------------------------------------------
# `.` repurposed: move-window (default) -> rename-session
unbind .
bind . command-prompt -p "Rename session:" "rename-session '%%'"

# --- Copy mode (vi) ------------------------------------------------------------
# v begins, y / Enter copy the selection to the system clipboard via OSC 52
# (set-clipboard on, see general.conf). Mouse-drag copy keeps tmux's default
# binding, which also honors set-clipboard.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# --- Popups --------------------------------------------------------------------
# Shared popup styling (%hidden: config-parse variables, not exported).
%hidden popup_bg="bg=colour235"
%hidden todo_border="fg=colour142"
%hidden save_border="fg=colour109"

# Todo float (obsidian vault)
# prefix + t : compact quick-glance (toggle)
# prefix + T : full editor (toggle)          (shadows nothing by default)
# prefix + a : quick-add to inbox
bind t display-popup -E -b rounded -S "$todo_border" -s "$popup_bg" \
  -T " 󰄬 Todo " -w 40% -h 50% "$HOME/.local/bin/tmux-todo"
bind T display-popup -E -b rounded -S "$todo_border" -s "$popup_bg" \
  -T " 󰄬 Todo " -w 80% -h 80% "$HOME/.local/bin/tmux-todo"
bind a display-popup -E -b rounded -S "$todo_border" -s "$popup_bg" \
  -T " 󰐖 Add Task " -w 50% -h 3 "$HOME/.local/bin/tmux-todo-add"

# Window save/restore
# prefix + S : save current window layout (panes, cwds, commands)
# prefix + s : restore a saved window via fzf picker
#              NOTE: shadows the default `s` (choose-tree session picker);
#              use `prefix + w` for the built-in session/window tree instead.
bind S display-popup -E -b rounded -S "$save_border" -s "$popup_bg" \
  -T "  Save Window " -w 40% -h 4 "$HOME/.local/bin/tmux-save-window"
bind s display-popup -E -b rounded -S "$save_border" -s "$popup_bg" \
  -T "  Restore Window " -w 60% -h 50% "$HOME/.local/bin/tmux-restore-window"

# --- Passthrough ----------------------------------------------------------------
# Let Ctrl-\ reach applications (SIGQUIT); vim-tmux-navigator binds it to
# "last pane", which we deliberately drop.
unbind -T root C-\\
unbind -T copy-mode-vi C-\\

