# Keybindings

# Splits inherit the current pane's working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

unbind-key .
bind-key . command-prompt -p "Rename session:" "rename-session '%%'"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Todo float (obsidian vault)
# prefix + t : compact quick-glance (toggle)
# prefix + T : full editor (toggle)
# prefix + a : quick-add to inbox
bind t display-popup -E -b rounded \
  -S "fg=colour142" \
  -s "bg=colour235" \
  -T " 󰄬 Todo " \
  -w 40% -h 50% \
  "$HOME/.local/bin/tmux-todo"
bind T display-popup -E -b rounded \
  -S "fg=colour142" \
  -s "bg=colour235" \
  -T " 󰄬 Todo " \
  -w 80% -h 80% \
  "$HOME/.local/bin/tmux-todo"
bind a display-popup -E -b rounded \
  -S "fg=colour142" \
  -s "bg=colour235" \
  -T " 󰐖 Add Task " \
  -w 50% -h 3 \
  "$HOME/.local/bin/tmux-todo-add"

# Window save/restore
# prefix + S : save current window layout (panes, cwds, commands)
# prefix + s : restore a saved window via fzf picker
bind S display-popup -E -b rounded \
  -S "fg=colour109" \
  -s "bg=colour235" \
  -T "  Save Window " \
  -w 40% -h 4 \
  "$HOME/.local/bin/tmux-save-window"
bind s display-popup -E -b rounded \
  -S "fg=colour109" \
  -s "bg=colour235" \
  -T "  Restore Window " \
  -w 60% -h 50% \
  "$HOME/.local/bin/tmux-restore-window"

# Allow Ctrl-\ to pass through to applications (for SIGQUIT)
unbind-key -T root C-\\
unbind-key -T copy-mode-vi C-\\

