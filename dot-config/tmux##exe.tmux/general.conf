# General settings.

# --- Terminal ----------------------------------------------------------------
# Truecolor via terminal-features RGB (modern replacement for the legacy
# `terminal-overrides ,*:Tc` extension — do not add Tc back).
set -s default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
set -s extended-keys on
set -s escape-time 10
set -s focus-events on

# OSC 52 clipboard: tmux emits the OSC 52 escape on copy so copy-mode
# selections (and apps like nvim) reach the outer terminal's system
# clipboard over ssh; ghostty honors it. 'on' (vs the default 'external')
# also lets apps inside tmux set the clipboard, not just read from it.
# NOTE: works over ssh — mosh 1.4.0 silently drops OSC 52.
set -s set-clipboard on
set -as terminal-features ',xterm-ghostty:clipboard'

# for image.nvim
set -g allow-passthrough on

# Push the session name to the outer terminal's window title (ghostty reads
# the OSC 2 escape tmux emits here) so each ghostty window/tab shows which
# tmux session it holds instead of the running command.
set -g set-titles on
set -g set-titles-string "#S"

# --- Behavior ----------------------------------------------------------------
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g visual-activity off
setw -g pane-base-index 1
setw -g mode-keys vi

# --- Window autosave hooks ----------------------------------------------------
# Auto-save window state (layout, cwds, commands) for explicitly saved windows.
# Structural events only: after-select-pane / session-window-changed fired a
# shell on every pane focus change and window switch (hot paths — made
# interactive navigation sluggish) while capturing nothing those events change.
set-hook -g after-split-window  'run-shell -b "$HOME/.local/bin/tmux-autosave-window"'
set-hook -g after-kill-pane     'run-shell -b "$HOME/.local/bin/tmux-autosave-window"'
set-hook -g after-select-layout 'run-shell -b "$HOME/.local/bin/tmux-autosave-window"'
set-hook -g after-resize-pane   'run-shell -b "$HOME/.local/bin/tmux-autosave-window"'

