# TPM plugin declarations + bootstrap.

# --- Plugin path (XDG-aware) -------------------------------------------------
# Determine plugin directory based on XDG_DATA_HOME.
# NOTE: must be synchronous (no `-b`). With `-b` the set-environment runs in the
# background and races the `run-shell ".../tpm"` below; TPM then loads before the
# path is set, falls back to ~/.config/tmux/plugins (wrong dir), and silently
# sources no plugins until a manual `prefix + I/U`.
if-shell "test -n \"\$XDG_DATA_HOME\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"\$XDG_DATA_HOME/tmux/plugins\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"$HOME/.local/share/tmux/plugins\""

# --- Plugins -----------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jabirali/tmux-tilish'

# Make tilish's Alt+hjkl vim-aware via vim-tmux-navigator.
# (The previously set @tilish-bindings/@tilish-cycle are not tilish options —
# it only reads: createauto default dmenu easymode enforce navigate navigator
# prefix project remap shiftnum smartsplits.)
set -g @tilish-navigator 'on'

# --- Bootstrap TPM + install missing plugins --------------------------------
# Runs *synchronously* (no -b) and *after* the @plugin lines above: the
# bootstrap script clones TPM if missing and then installs any declared
# plugin that isn't present yet (TPM's init only loads, never clones). Both
# must complete before the init below runs.
run-shell "~/.config/tmux/bootstrap-tpm.sh"

# --- Initialize TPM (keep at end) -------------------------------------------
# Sources tpm and all @plugin entries. No manual plugin sourcing needed.
run-shell "~/.local/share/tmux/plugins/tpm/tpm"

