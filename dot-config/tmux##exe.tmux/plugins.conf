# --- Plugin path (XDG-aware) -------------------------------------------------
# Determine plugin directory based on XDG_DATA_HOME
if-shell -b "test -n \"\$XDG_DATA_HOME\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"\$XDG_DATA_HOME/tmux/plugins\"" \
  "set-environment -g TMUX_PLUGIN_MANAGER_PATH \"$HOME/.local/share/tmux/plugins\""

# --- Plugins -----------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jabirali/tmux-tilish'

set -g @tilish-bindings "on"
set -g @tilish-cycle "on"

# --- Bootstrap TPM + install missing plugins --------------------------------
# Runs *synchronously* (no -b) and *after* the @plugin lines above: the
# bootstrap script clones TPM if missing and then installs any declared
# plugin that isn't present yet (TPM's init only loads, never clones). Both
# must complete before the init below runs.
run-shell "~/.config/tmux/bootstrap-tpm.sh"

# --- Initialize TPM (keep at end) -------------------------------------------
# Sources tpm and all @plugin entries. No manual plugin sourcing needed.
run-shell "~/.local/share/tmux/plugins/tpm/tpm"

