#
# Main tmux config (v3.4+). Splits into modular includes.
# Order matters: tpipeline overrides colors' status content; keys is last so
# its unbinds override plugin-installed maps (TPM runs synchronously in
# plugins.conf).

# --- Load configs ------------------------------------------------------------
source-file ~/.config/tmux/general.conf
source-file ~/.config/tmux/colors.conf
source-file ~/.config/tmux/plugins.conf
source-file ~/.config/tmux/tpipeline.conf
source-file ~/.config/tmux/keys.conf

# vim: set ft=tmux ts=2 sw=2:
