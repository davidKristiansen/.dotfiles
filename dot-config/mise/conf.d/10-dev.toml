# Lightweight dev tools — installed everywhere, including devcontainers.
# Heavy toolchains (rust, java, zig, …) live in 20-host.toml##!docker;
# devcontainers get those from their image or a project-local mise.toml.

[tools]
# Node (runtime is declared once in 00-core.toml)
npm = "latest"
"npm:prettier" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"

# Python
python = "3.14"
pipx = "latest"
uv = "0.11.24"
"pipx:xonsh" = { version = "latest", extras = "full" }  # Python shell; extras=full → ptk editor + pygments
ty = "latest"
ruff = "latest"

# Go
go = "latest"

# Lua
stylua = "latest"

# Git / CI
pre-commit = "latest"
github-cli = "latest"
sqlite = "latest"
