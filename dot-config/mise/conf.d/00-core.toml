fd = "latest"
ripgrep = "latest"
fzf = "latest"
delta = "latest"
direnv = "latest"
neovim = "latest"
lazygit = "latest"
yazi = "latest"
opencode = "v1.17.13"
eza = "latest"
zoxide = "latest"
mutagen = "latest"
"pipx:mempalace" = "latest"
"pipx:commitizen" = "latest"
allure = "latest"
"npm:context-mode" = "latest"
"go:github.com/maaslalani/sheets" = "latest"
"cargo:nvim-mcp" = "latest"
"aqua:google-antigravity/antigravity-cli" = "latest"
"npm:hunkdiff" = "latest"
tree-sitter = "latest"
node = "latest"
claude = "latest"
starship = "latest"
"pipx:graphifyy" = {version = "latest", extras = "pdf,office,mcp,svg,ollama"}
