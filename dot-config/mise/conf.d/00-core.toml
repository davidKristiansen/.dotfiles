#
# Core settings and essential CLI tools — installed everywhere
# (laptop, workstation, and server devcontainers).

[settings]
experimental = true
jobs = 32
idiomatic_version_file_enable_tools = ["python"]

[tools]
# Shell & CLI essentials
bat = "latest"
bat-extras = "latest"
fd = "latest"
ripgrep = "latest"
fzf = "latest"
delta = "latest"
direnv = "latest"
eza = "latest"
zoxide = "latest"
starship = "latest"
usage = "latest"

# Editor & TUIs
neovim = "latest"
lazygit = "latest"
yazi = "latest"
tree-sitter = "latest"

# Agents & agent tooling
claude = "latest"
"npm:context-mode" = "latest"
"pipx:graphifyy" = { version = "latest", extras = "pdf,office,mcp,svg" }

hunkdiff = "latest"  # interactive diff viewer / git pager (`hunk`) — aqua, prebuilt

# Runtime for the npm:* backends above — single source of truth for node
node = "lts"
"pipx:nvim-mcp" = "latest"

